[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

solc_version = "0.8.28"  # 指定 Solidity 版本
optimizer = true
optimizer_runs = 200

# 在这里定义你的 RPC 端点别名
[rpc_endpoints]
testnet-bsc = "${TESTNET_BSC_RPC_URL}"   # 引用 .env 文件中的变量
local   = "${LOCAL_RPC_URL}"
mainnet = "https://eth-mainnet.g.alchemy.com/v2/YOUR_API_KEY" # 也可以直接写